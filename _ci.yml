name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

# Out-of-the-box CI for projects generated from the slint-mobile template.
# All recipes live in the root `justfile`; this workflow just installs
# toolchains and calls into it, so `just <recipe>` works identically in
# CI and on a developer's laptop.
#
# - `fmt` / `clippy` / `test` run on every push and PR.
# - `apk` cross-compiles for aarch64-linux-android on pushes to main/master
#   and uploads the resulting APK as a build artifact.
#
# Security note: this workflow uses `github.event_name` and `github.ref`
# only inside a workflow-context `if:` expression. No untrusted PR / issue
# / commit fields are interpolated into shell commands; all `$VAR`
# references in `run:` blocks come from the workflow's own `env:` block
# or runner-managed variables (`ANDROID_HOME`, `GITHUB_ENV`).

jobs:
  fmt:
    name: just fmt-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just fmt-check

  clippy:
    name: just clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just install-host-deps
      - uses: Swatinem/rust-cache@v2
      - run: just clippy

  test:
    name: just test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@v2
        with:
          tool: just
      - run: just install-host-deps
      - uses: Swatinem/rust-cache@v2
      - run: just test

  apk:
    name: just release (aarch64-linux-android)
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master')
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      ANDROID_API: "34"
      ANDROID_BUILD_TOOLS: "34.0.0"
      ANDROID_NDK_VERSION: "27.0.12077973"
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,x86_64-linux-android

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - uses: android-actions/setup-android@v3
        with:
          packages: ""

      - name: Install Android platform, build-tools, NDK
        run: |
          sdkmanager --install \
            "platform-tools" \
            "platforms;android-$ANDROID_API" \
            "build-tools;$ANDROID_BUILD_TOOLS" \
            "ndk;$ANDROID_NDK_VERSION"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/$ANDROID_NDK_VERSION" >> "$GITHUB_ENV"

      - uses: taiki-e/install-action@v2
        with:
          tool: just

      # cargo-apk2 isn't packaged by taiki-e/install-action, so install
      # from crates.io. The Swatinem cache below covers it on re-runs.
      - run: cargo install cargo-apk2 --locked

      # Kotlin compiler — only invoked by cargo-apk2 when a crate declares
      # `kotlin_sources`. Cheap enough to bundle unconditionally so that
      # any future glue crate Just Works on CI without revisiting this file.
      - name: Install Kotlin compiler
        run: |
          curl -sSL https://github.com/JetBrains/kotlin/releases/download/v1.9.0/kotlin-compiler-1.9.0.zip -o /tmp/kotlinc.zip
          unzip -q /tmp/kotlinc.zip -d "$HOME"
          echo "KOTLIN_HOME=$HOME/kotlinc" >> "$GITHUB_ENV"
          echo "$HOME/kotlinc/bin" >> "$GITHUB_PATH"

      - uses: Swatinem/rust-cache@v2

      - run: just release

      - uses: actions/upload-artifact@v4
        with:
          name: apk
          # Multi-arch APK lands at target/release/apk/; single-arch builds
          # land under target/<triple>/release/apk/. Glob covers both.
          path: target/**/apk/*.apk
          if-no-files-found: error
